[pytest]
# PyTest configuration for pyBrowser

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=browser
    --cov-report=html
    --cov-report=term-missing:skip-covered
    --cov-report=xml
    --cov-branch
    --junitxml=test-results.xml

# Markers for test categorization
markers =
    unit: Unit tests for isolated functions/classes
    integration: Integration tests for multiple components
    slow: Tests that take significant time
    qt: Tests that require Qt framework

testpaths = tests

# Qt configuration
qt_api = pyside6

# Minimum coverage threshold for ci/cd
# Uncomment to enforce a minimum coverage percentage
# --cov-fail-under=80
